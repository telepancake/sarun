# Static musl is the ONLY build. The dynamic glibc path is gone — sarun
# ships a single static executable. Plain `cargo build` from engine/ uses
# this default target; the linker setup is handled by cargo-zigbuild (so
# you run `cargo zigbuild --release` or `make engine`, NOT `cargo build`
# directly — there is no musl-gcc on this system and we don't want one).

[build]
target = "x86_64-unknown-linux-musl"
