# sarun: vendored, lib-only patched fork of n2 (github.com/evmar/n2).
# Pinned upstream commit: b1fead52ccda0c497d816696f23f4099c3e8ec1f
#
# Why vendored: sarun embeds n2 IN-PROCESS and replaces n2's per-recipe
# `/bin/sh -c` posix_spawn with an in-process embedded-brush executor (see
# the `// sarun:` patch in src/process_posix.rs). All other n2 sources are
# byte-for-byte upstream so this fork stays auditable / re-syncable.
#
# Changes vs upstream, all marked `// sarun:`:
#   * Cargo.toml: lib-only (dropped [[bin]], benches, jemalloc — `default`
#     feature is now empty, matching `--no-default-features`); windows-sys
#     target dep dropped (we only build unix).
#   * lib.rs: dropped the jemalloc global_allocator block and process_win mod.
#   * process_posix.rs: run_command routes to a global executor hook when set.
#   * signal.rs: register_sigint is a no-op when the embedded hook is active.
[package]
name = "n2"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "a ninja compatible build system (sarun vendored lib-only fork)"

[lib]
name = "n2"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
lexopt = "0.3.0"
libc = "0.2"
rustc-hash = "1.1.0"

[features]
default = []
crlf = []
