[package]
name = "sarun-engine"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "sarun"
path = "src/main.rs"

[dependencies]
base64 = "0.22.1"
brush-core = "0.5"
brush-builtins = "0.2"
brush-parser = { version = "0.4", features = ["serde"] }
crossterm = "0.29"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
fuser = "0.17.0"
glob = "0.3.3"
libc = "0.2.186"
portable-pty = "0.9"
ratatui = "0.30.1"
rusqlite = { version = "0.32", features = ["bundled"] }
serde_json = "1.0.150"
similar = "3.1.1"
tui-term = { version = "0.3", features = ["vt100"] }
